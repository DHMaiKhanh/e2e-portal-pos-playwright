stages:
  - quality
  - test

variables:
  ENV: stage
  npm_config_cache: '$CI_PROJECT_DIR/.npm'

default:
  image: mcr.microsoft.com/playwright:v1.48.0-jammy
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

quality:
  stage: quality
  script:
    - npm run lint
    - npm run typecheck

e2e:
  stage: test
  script:
    - npx playwright test
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - reports/html
      - reports/allure-results
      - reports/junit
    reports:
      junit: reports/junit/results.xml
